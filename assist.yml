run:
  - name: verify:knip
    command: npx
    args:
      - knip
      - --no-progress
      - --treat-config-hints-as-errors
  - name: verify:lint
    command: npx
    args:
      - oxlint
      - --config
      - .oxlintrc.json
      - --fix
      - .
  - name: verify:format
    command: npx
    args:
      - oxfmt
      - .
  - name: verify:duplicate-code
    command: npx
    args:
      - jscpd
      - --format
      - "'typescript,tsx'"
      - --exit-code
      - "1"
      - --ignore
      - "'**/*.test.*'"
      - -r
      - consoleFull
      - src
  - name: verify:build
    command: npm
    args:
      - run
      - build
  - name: verify:test
    command: npm
    args:
      - run
      - test
  - name: verify:circular-deps
    command: npx
    args:
      - -y
      - skott
      - --displayMode=raw
      - --showCircularDependencies
      - --exitCodeOnCircularDependencies=1
      - src/main.tsx
    quiet: true
  - name: verify:maintainability
    command: assist
    args:
      - complexity
      - maintainability
      - ./src
      - --threshold
      - "60"
  - name: scan-tiles
    command: npm
    args:
      - run
      - scan-tiles
commit:
  push: true
deny:
  - pattern: npm run dev
    message: Do not start the dev server — the user runs it themselves. Use /verify to check work.
  - pattern: vite dev
    message: Do not start the dev server — the user runs it themselves. Use /verify to check work.
  - pattern: tsc
    message: Do not run tsc/build directly — run /verify (assist verify), which builds and runs all checks.
  - pattern: oxlint
    message: Do not run oxlint directly — run /verify (assist verify); its verify:lint step runs oxlint and prints the same rule violations.
